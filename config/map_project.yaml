      vector:
        group_name: vector
        layers: ['com_line', 'com_point', 'infra_line', 'infra_polygon', 'infra_point', 'lieudit_point', 'road_line', 'road_polygon', 'route_line', 'route_polygon']
      sequoia:
        group_name: sequoia
        layers: ['prop_line', 'parca_polygon_occup', 'ua_polygon_occup']
      wms:
        group_name: wms
        layers: ['wms_scan25_grey', 'wms_scan100', 'wms_scan1000', 'wms_pci', 'wms_irc', 'wms_rgb']
      themes:
        - name: 1_vector+sequoia
          visible: ['ua_polygon_occup', 'parca_polygon_occup', 'prop_line',  'route_polygon',  'route_line', 'road_polygon', 'road_line', 'lieudit_point', 'infra_point', 'infra_polygon', 'infra_line', 'com_point', 'com_line']
