      wms:
        group_name: wms
        layers: ['wms_scan25_grey', 'wms_scan100', 'wms_scan1000', 'wms_pci', 'wms_irc', 'wms_rgb']
      themes:
        - name: 1_vector+sequoia
          visible: ['parca_polygon', 'prop_line',  'route_polygon',  'route_line', 'road_polygon', 'road_line', 'lieudit_point', 'infra_point', 'infra_polygon', 'infra_line', 'com_point', 'com_line']
