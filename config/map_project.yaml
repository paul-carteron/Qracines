map_project:
  situation:
    defaut:
      theme: '1_scan25'
      scale: 25000
      legend: 'parca_polygon_lgd_situation'

    wooded:
      legend1_layers: ['parca_polygon_lgd_situation', 'prop_polygon']
      vector:
        group_name: vector
        layers: ['coms_line', 'coms_point', 'infra_point_acces']
      sequoia:
        group_name: sequoia
        layers: ['prop_point', 'prop_line', 'prop_polygon']
      wms:
        group_name: wms
        layers: ['wms_scan25', 'wms_scan1000']
      themes:
        - name: 1_scan25
          visible: ['prop_polygon', 'infra_point_acces', 'coms_point', 'coms_line', 'wms_scan25']
          hidden: ['prop_point', 'parca_polygon_lgd_situation', 'wms_scan1000']
        - name: 2_scan1000
          visible: ['prop_point', 'wms_scan1000']
          hidden: ['prop_polygon', 'infra_point_acces', 'coms_point', 'coms_line', 'parca_polygon_lgd_situation', 'wms_scan25']

    unwooded:
      legend1_layers: ['parca_polygon_lgd_situation', 'ua_polygon_occup']
      vector: 
        group_name: vector
        layers: ['coms_line', 'coms_point', 'infra_point_acces']
      sequoia:
        group_name: sequoia
        layers: ['prop_point', 'prop_line', 'ua_polygon_occup']
      wms:
        group_name: wms
        layers: ['wms_scan25', 'wms_scan1000']
      themes:
        - name: 1_scan25
          visible: ['ua_polygon_occup', 'prop_polygon', 'infra_point_acces', 'coms_point', 'coms_line', 'wms_scan25']
          hidden: ['prop_point', 'parca_polygon_lgd_situation', 'wms_scan1000']
        - name: 2_scan1000
          visible: ['prop_point', 'wms_scan1000']
          hidden: ['ua_polygon_occup', 'prop_polygon', 'infra_point_acces', 'coms_point', 'coms_line', 'parca_polygon_lgd_situation', 'wms_scan25']

