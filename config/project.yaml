situation:
  canvas:
    scale: 25000
    zoom_on: 'prop_line'
    groups: 
      - name: LEGEND
        type: vector
        layers: ['parca_polygon_lgd_situation']
      - name: VECTOR
        type: vector
        layers: ['coms_line', 'coms_point', 'infra_point_acces']
      - name: SEQUOIA
        type: vector
        layers: ['prop_point', 'prop_line', 'prop_polygon']
      - name: WMS
        type: wms
        layers: ['wms_scan25', 'wms_scan1000']

    themes:
      - name: 1_SCAN25
        show: ['prop_polygon', 'infra_point_acces', 'coms_point', 'coms_line', 'wms_scan25']
      - name: 2_SCAN1000
        show: ['prop_point', 'wms_scan1000']

  layout:
    theme: '1_SCAN25'
    legends:
      - name: 'legend1'
        layers: ['parca_polygon_lgd_situation', 'prop_polygon']

assemblage:
  canvas:
    scale: 7500
    zoom_on: ['parca_polygon']
    groups:
      - name: LEGEND
        type: vector
        layers: ['parca_polygon_lgd_assemblage']
      - name: VECTOR
        type: vector
        layers: &assemblage_w_vect ['com_line', 'com_point', 'infra_line', 'infra_polygon', 'infra_point', 'lieudit_point', 'road_line', 'road_polygon', 'route_line', 'route_polygon']
      - name: SEQUOIA
        type: vector
        layers: &assemblage_w_seq ['prop_line', 'parca_polygon']
      - name: WMS
        type: wms
        layers: &assemblage_w_wms ['wms_scan25_grey', 'wms_scan100', 'wms_scan1000', 'wms_pci', 'wms_irc', 'wms_rgb']

    themes:
      - name: 1_VECTOR+SEQUOIA
        show: [*assemblage_w_vect, *assemblage_w_seq]
      - name: 2_VECTOR+SEQUOIA+WMS
        show: [*assemblage_w_vect, *assemblage_w_seq, *assemblage_w_wms]
      - name: 3_SEQUOIA+WMS
        show: [*assemblage_w_vect, *assemblage_w_wms]
  
  layout:
    theme: '1_VECTOR+SEQUOIA'
    legends:
      - name: 'legend1'
        layers: ['parca_polygon_lgd_assemblage', 'parca_polygon']

peuplements:
  canvas:
    scale: 7500
    zoom_on: 'com_line'
    groups:
      - name: LEGEND
        type: vector
        layers: ['parca_polygon_lgd_peuplements']
      - name: VECTOR
        type: vector
        layers: &peuplements_w_vect 
          - 'com_line'
          - 'com_point'
          - 'infra_line'
          - 'infra_polygon'
          - 'infra_point'
          - 'lieudit_point'
          - 'road_line'
          - 'road_polygon'
          - 'route_line'
          - 'route_polygon'
      - name: SEQUOIA
        type: vector
        layers: &peuplements_w_seq
          - 'pf_line'
          - 'pf_polygon'
          - 'sspf_polygon'
          - 'sspf_polygon_plt'
          - 'parca_polygon_occup'
          - 'ua_polygon'
          - 'ua_polygon_plt'
          - 'ua_polygon_ame'
      - name: WMS
        type: wms
        layers: &peuplements_w_wms
          - 'wms_scan25_grey'
          - 'wms_scan100'
          - 'wms_scan1000'
          - 'wms_pci'
          - 'wms_irc'
          - 'wms_rgb'

    themes:
      - name: 1_VECTOR+SEQUOIA
        show: [*peuplements_w_vect, *peuplements_w_seq]
      - name: 2_VECTOR+SEQUOIA+WMS
        show: [*peuplements_w_vect, *peuplements_w_seq, *peuplements_w_wms]
      - name: 3_SEQUOIA+WMS
        show: [*peuplements_w_vect, *peuplements_w_wms]

  layout:
    theme: '1_VECTOR+SEQUOIA'
    legends:
      - name: 'legend1'
        layers: ['parca_polygon_lgd_peuplements']
      - name: 'legend2'
        layers: ['sspf_polygon_plt']

