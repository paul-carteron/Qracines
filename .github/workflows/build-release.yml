name: Build and Release QGIS Plugin

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Get latest version and bump patch
        id: version
        run: |
          git fetch --tags

          LAST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)

          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else
            VERSION=${LAST_TAG#v}
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Qt tools (for pyrcc5)
        run: |
          sudo apt-get update
          sudo apt-get install -y pyqt5-dev-tools

      - name: Update metadata.txt
        run: |
          sed -i "s/version=.*/version=${{ steps.version.outputs.version }}/" Qracines/metadata.txt

      - name: Update plugins.xml
        run: |
          sed -i "s/version=\"[^\"]*\"/version=\"${{ steps.version.outputs.version }}\"/" plugins.xml
          sed -i "s|v[0-9]\+\.[0-9]\+\.[0-9]\+|v${{ steps.version.outputs.version }}|g" plugins.xml

      - name: Commit version changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add Qracines/metadata.txt plugins.xml
          git commit -m "Release ${{ steps.version.outputs.version }}" || echo "No changes"
          git push

      - name: Create ZIP
        run: |
          zip -r Qracines.zip Qracines -x "Qracines/__pycache__/*"

      - name: Create GitHub beta Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: "Qracines-${{ steps.version.outputs.version }}"
          files: Qracines.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}